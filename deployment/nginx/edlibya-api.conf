# /etc/nginx/sites-available/edlibya-api
# EdLibya Production Nginx Configuration – with video streaming support
# Enable: ln -s /etc/nginx/sites-available/edlibya-api /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.edlibya.ly;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.edlibya.ly;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.edlibya.ly/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.edlibya.ly/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/edlibya/backend/public;
    index index.php;

    # Large upload support (course videos)
    client_max_body_size 500M;
    client_body_timeout 300s;

    # ── Sendfile / AIO for efficient static & video serving ─────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    # ── Gzip – EXCLUDE video MIME types (already compressed) ────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css
               application/xml text/xml application/x-font-ttf image/svg+xml;
    gzip_min_length 1000;
    # Never gzip video – it wastes CPU and breaks Range requests
    gzip_disable "video/*";

    # ── Proxy / FastCGI timeouts (needed for large video streaming responses)
    fastcgi_read_timeout    600s;
    fastcgi_send_timeout    600s;
    fastcgi_connect_timeout 60s;
    proxy_read_timeout      600s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # ── Range-request passthrough ─────────────────────────────────────
        # Ensure Range, If-Range and response headers pass through correctly.
        fastcgi_param HTTP_RANGE            $http_range;
        fastcgi_param HTTP_IF_RANGE         $http_if_range;

        # Disable buffering for streaming endpoints so PHP can flush chunks
        fastcgi_buffering       off;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    # ── Video streaming endpoint – special tuning ────────────────────────────
    # Routes: /api/v1/video/stream/{lesson}?token=…
    location ~ ^/api/v1/video/stream/ {
        try_files $uri $uri/ /index.php?$query_string;

        # Pass Range / If-Range headers to PHP-FPM
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        fastcgi_param HTTP_RANGE    $http_range;
        fastcgi_param HTTP_IF_RANGE $http_if_range;

        # Disable Nginx buffering – let PHP stream directly to client
        fastcgi_buffering off;

        # Allow large video files to stream without Nginx timeout
        fastcgi_read_timeout 600s;

        # CORS headers for video player cross-origin requests
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;

        # Handle OPTIONS pre-flight
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    # ── Static asset caching (images, CSS, JS – NOT video) ──────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny direct access to private storage (video files are served via PHP)
    location ~* \.(mp4|webm|mkv|mov|avi|ogg)$ {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }
}

